# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  lint:
    permissions: {}

    build:
      name: Lint
      runs-on: ubuntu-latest

      permissions:
         # contents permission to clone the repository
        contents: read
        packages: read
        # issues and pull-requests permissions to write results as pull
        # request comments. Omit them if you don't need summary comments
        issues: write
        pull-requests: write
        # To report GitHub Actions status checks. Omit if you don't need
        # to update commit status
         statuses: write

       steps:
        - name: Checkout code
          uses: actions/checkout@v6
          with:
            # super-linter needs the full git history to get the
            # list of files that changed across commits
            fetch-depth: 0
            persist-credentials: false

         - name: Super-linter
           uses: super-linter/super-linter@v8.5.0 # x-release-please-version
           env:
            # To report GitHub Actions status checks
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  deploy:
    needs: lint
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
